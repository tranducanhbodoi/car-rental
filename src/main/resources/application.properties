spring.application.name=car-rental

# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/carrental?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=CarRentalSecretKey2024VeryLongSecretKeyForHS512AlgorithmMustBeAtLeast512BitsLong
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB